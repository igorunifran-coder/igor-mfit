<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Igor Ferreira Team — Gerador de Treinos IA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f; --surface: #16181c; --surface2: #1e2026; --border: #2a2d35;
      --accent: #6c63ff; --accent2: #9d78ff; --green: #22c55e; --red: #ef4444;
      --yellow: #f59e0b; --text: #e8eaf0; --muted: #8b8fa8; --card: #1a1d24;
    }
    html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }
    #app { display: grid; grid-template-columns: 260px 1fr; grid-template-rows: 56px 1fr 200px; height: 100vh; }
    #header { grid-column: 1 / -1; display: flex; align-items: center; gap: 12px; padding: 0 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
    #sidebar { grid-row: 2 / 3; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    #main { grid-row: 2 / 3; overflow-y: auto; padding: 24px; background: var(--bg); }
    #logpanel { grid-column: 1 / -1; background: var(--surface); border-top: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    #header h1 { font-size: 16px; font-weight: 700; letter-spacing: .3px; }
    #header .logo { font-size: 22px; }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); margin-left: auto; }
    #status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
    #status-dot.offline { background: var(--red); }
    #status-label { font-size: 12px; color: var(--muted); }
    .sidebar-header { padding: 14px 16px 10px; font-size: 11px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); }
    #student-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
    .student-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; transition: background .15s; margin-bottom: 2px; border: 1px solid transparent; }
    .student-item:hover { background: var(--surface2); }
    .student-item.active { background: var(--surface2); border-color: var(--accent); }
    .student-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .student-info .name { font-size: 14px; font-weight: 500; }
    .student-info .level { font-size: 11px; color: var(--muted); }
    .level-badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; margin-left: auto; flex-shrink: 0; }
    .level-badge.iniciante { background: #16423c; color: #4ade80; }
    .level-badge.intermediario { background: #2d2500; color: #fbbf24; }
    .level-badge.avancado { background: #2d0f0f; color: #f87171; }
    #btn-new-student { margin: 8px; padding: 9px; border-radius: 8px; border: 1px dashed var(--border); background: none; color: var(--muted); cursor: pointer; font-size: 13px; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    #btn-new-student:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
    .welcome { text-align: center; padding: 80px 20px; color: var(--muted); }
    .welcome .icon { font-size: 48px; margin-bottom: 16px; }
    .welcome h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
    .student-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .student-card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
    .student-big-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; }
    .student-card-header h2 { font-size: 20px; font-weight: 700; }
    .student-card-header p { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .btn-edit { margin-left: auto; background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all .15s; }
    .btn-edit:hover { color: var(--text); border-color: var(--accent); }
    .btn-delete { background: none; border: 1px solid var(--border); color: var(--red); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-left: 8px; transition: all .15s; }
    .btn-delete:hover { background: #2d0f0f; }
    .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .info-box { background: var(--surface2); border-radius: 8px; padding: 12px; }
    .info-box .label { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
    .info-box .value { font-size: 15px; font-weight: 600; }
    .btn-primary { background: var(--accent); color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .btn-success { background: #166534; color: #4ade80; border: 1px solid #166534; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-success:hover { background: #15803d; transform: translateY(-1px); }
    .btn-success:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .action-row { display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0; }
    #workout-result { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: none; }
    #workout-result h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
    #workout-content { font-size: 13px; line-height: 1.7; color: #c8ccd8; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
    .log-header { padding: 8px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .log-header span { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    #ws-status { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
    #ws-status.connected { background: var(--green); box-shadow: 0 0 5px var(--green); }
    #log-clear { margin-left: auto; background: none; border: none; color: var(--muted); font-size: 11px; cursor: pointer; padding: 2px 8px; border-radius: 4px; }
    #log-clear:hover { color: var(--text); background: var(--surface2); }
    #log-list { flex: 1; overflow-y: auto; padding: 6px 16px; font-family: 'Consolas', monospace; font-size: 12px; }
    .log-entry { padding: 2px 0; border-bottom: 1px solid #1a1d24; display: flex; gap: 10px; }
    .log-ts { color: #3d4156; flex-shrink: 0; }
    .log-msg.ok { color: var(--green); }
    .log-msg.erro { color: var(--red); }
    .log-msg.info { color: #93c5fd; }
    .log-msg.warn { color: var(--yellow); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
    .modal-overlay.hidden { display: none; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 480px; max-width: 95vw; }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .4px; }
    input, select, textarea { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 9px 12px; color: var(--text); font-size: 14px; outline: none; transition: border .15s; font-family: inherit; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 70px; }
    select option { background: var(--surface); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .btn-cancel { background: none; border: 1px solid var(--border); color: var(--muted); padding: 9px 18px; border-radius: 7px; cursor: pointer; font-size: 14px; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div id="app">
  <header id="header">
    <span class="logo">🏋️</span>
    <h1>Igor Ferreira Team — Gerador de Treinos IA</h1>
    <div id="status-dot"></div>
    <span id="status-label">verificando...</span>
  </header>
  <aside id="sidebar">
    <div class="sidebar-header">Alunos</div>
    <div id="student-list"></div>
    <button id="btn-new-student">＋ Novo Aluno</button>
  </aside>
  <main id="main">
    <div class="welcome" id="welcome-msg">
      <div class="icon">🤖</div>
      <h2>Selecione um aluno</h2>
      <p style="font-size:14px;margin-top:6px">Escolha um aluno na lista ou adicione um novo para gerar treinos com IA</p>
    </div>
    <div id="student-view" style="display:none">
      <div class="student-card">
        <div class="student-card-header">
          <div class="student-big-avatar" id="view-avatar"></div>
          <div><h2 id="view-name"></h2><p id="view-subtitle"></p></div>
          <button class="btn-edit" onclick="editCurrentStudent()">✏️ Editar</button>
          <button class="btn-delete" onclick="deleteCurrentStudent()">🗑️</button>
        </div>
        <div class="info-grid">
          <div class="info-box"><div class="label">Idade</div><div class="value" id="view-idade"></div></div>
          <div class="info-box"><div class="label">Peso</div><div class="value" id="view-peso"></div></div>
          <div class="info-box"><div class="label">Altura</div><div class="value" id="view-altura"></div></div>
          <div class="info-box"><div class="label">Objetivo</div><div class="value" id="view-objetivo"></div></div>
          <div class="info-box"><div class="label">Dias/sem</div><div class="value" id="view-dias"></div></div>
          <div class="info-box"><div class="label">Restrições</div><div class="value" id="view-restricoes" style="font-size:12px"></div></div>
        </div>
      </div>
      <div class="action-row">
        <button class="btn-primary" id="btn-gerar" onclick="gerarTreino()">🤖 Gerar Treino com IA</button>
        <button class="btn-success" id="btn-enviar" onclick="enviarMfit()" disabled>💪 Enviar para MFIT</button>
      </div>
      <div id="workout-result"><h3>✨ Treino Gerado</h3><div id="workout-content"></div></div>
    </div>
  </main>
  <div id="logpanel">
    <div class="log-header">
      <div id="ws-status"></div>
      <span>Logs em Tempo Real</span>
      <button id="log-clear" onclick="clearLogs()">limpar</button>
    </div>
    <div id="log-list"></div>
  </div>
</div>
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">Novo Aluno</h2>
    <div class="form-grid">
      <div class="form-group full"><label>Nome completo</label><input type="text" id="f-nome" placeholder="Ex: Pedro Silva" /></div>
      <div class="form-group"><label>Idade</label><input type="number" id="f-idade" placeholder="28" /></div>
      <div class="form-group"><label>Peso (kg)</label><input type="number" id="f-peso" placeholder="75" step="0.1" /></div>
      <div class="form-group"><label>Altura (cm)</label><input type="number" id="f-altura" placeholder="175" /></div>
      <div class="form-group"><label>Dias de treino/sem</label><select id="f-dias"><option value="3">3 dias</option><option value="4">4 dias</option><option value="5">5 dias</option><option value="6">6 dias</option></select></div>
      <div class="form-group full"><label>Objetivo</label><select id="f-objetivo"><option>Hipertrofia</option><option>Emagrecimento</option><option>Força</option><option>Condicionamento Físico</option><option>Resistência Muscular</option><option>Saúde Geral</option></select></div>
      <div class="form-group full"><label>Nível</label><select id="f-nivel"><option value="iniciante">Iniciante</option><option value="intermediario">Intermediário</option><option value="avancado">Avançado</option></select></div>
      <div class="form-group full"><label>Restrições / Observações</label><textarea id="f-restricoes" placeholder="Ex: dor no joelho esquerdo..."></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveStudent()">💾 Salvar</button>
    </div>
  </div>
</div>
<script>
  let students = JSON.parse(localStorage.getItem('mfit_students') || '[]');
  let selectedId = null, editingId = null, currentTreino = null, ws = null;
  function saveStudents() { localStorage.setItem('mfit_students', JSON.stringify(students)); }
  function initials(n) { return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
  function avatarColor(n) { const c=['#6c63ff','#ec4899','#14b8a6','#f59e0b','#3b82f6','#8b5cf6']; let h=0; for(let x of n) h=(h<<5)-h+x.charCodeAt(0); return c[Math.abs(h)%c.length]; }
  function levelLabel(l) { return l==='iniciante'?'Iniciante':l==='intermediario'?'Intermediário':'Avançado'; }
  const BASE = window.location.origin;
  async function checkStatus() {
    try {
      const d = await (await fetch(BASE+'/api/status')).json();
      document.getElementById('status-dot').className='online';
      document.getElementById('status-label').textContent='Online';
      addLog('info','✅ Servidor online — Anthropic:'+(d.anthropic?'✅':'❌')+' MFIT:'+(d.mfit_email?'✅':'❌'));
    } catch { document.getElementById('status-dot').className='offline'; document.getElementById('status-label').textContent='Offline'; addLog('erro','❌ Servidor offline'); }
  }
  function connectWS() {
    const proto = location.protocol==='https:'?'wss':'ws';
    ws = new WebSocket(proto+'://'+location.host);
    ws.onopen = ()=>{ document.getElementById('ws-status').className='connected'; addLog('info','📡 WebSocket conectado'); };
    ws.onclose = ()=>{ document.getElementById('ws-status').className=''; addLog('warn','🔌 Reconectando...'); setTimeout(connectWS,3000); };
    ws.onerror = ()=>{};
    ws.onmessage = (e)=>{ try { const d=JSON.parse(e.data); addLog(d.tipo||'info',d.msg); } catch {} };
  }
  function addLog(tipo, msg) {
    const list=document.getElementById('log-list'), el=document.createElement('div');
    el.className='log-entry';
    el.innerHTML=`<span class="log-ts">${new Date().toLocaleTimeString('pt-BR')}</span><span class="log-msg ${tipo}">${msg}</span>`;
    list.appendChild(el); list.scrollTop=list.scrollHeight;
  }
  function clearLogs() { document.getElementById('log-list').innerHTML=''; }
  function renderStudents() {
    const list=document.getElementById('student-list'); list.innerHTML='';
    if (!students.length) { list.innerHTML='<p style="color:var(--muted);font-size:12px;padding:12px 16px;text-align:center">Nenhum aluno ainda</p>'; return; }
    students.forEach(s=>{
      const el=document.createElement('div'); el.className='student-item'+(s.id===selectedId?' active':'');
      el.innerHTML=`<div class="student-avatar" style="background:${avatarColor(s.nome)}">${initials(s.nome)}</div><div class="student-info"><div class="name">${s.nome}</div><div class="level">${s.objetivo}</div></div><span class="level-badge ${s.nivel}">${levelLabel(s.nivel)}</span>`;
      el.onclick=()=>selectStudent(s.id); list.appendChild(el);
    });
  }
  function selectStudent(id) {
    selectedId=id; currentTreino=null;
    const s=students.find(x=>x.id===id); if (!s) return;
    renderStudents();
    document.getElementById('welcome-msg').style.display='none';
    document.getElementById('student-view').style.display='block';
    document.getElementById('workout-result').style.display='none';
    document.getElementById('btn-enviar').disabled=true;
    document.getElementById('view-avatar').textContent=initials(s.nome);
    document.getElementById('view-avatar').style.background=avatarColor(s.nome);
    document.getElementById('view-name').textContent=s.nome;
    document.getElementById('view-subtitle').textContent=levelLabel(s.nivel)+' · '+s.objetivo;
    document.getElementById('view-idade').textContent=s.idade?s.idade+' anos':'—';
    document.getElementById('view-peso').textContent=s.peso?s.peso+' kg':'—';
    document.getElementById('view-altura').textContent=s.altura?s.altura+' cm':'—';
    document.getElementById('view-objetivo').textContent=s.objetivo||'—';
    document.getElementById('view-dias').textContent=s.diasTreino?s.diasTreino+'x/sem':'—';
    document.getElementById('view-restricoes').textContent=s.restricoes||'Nenhuma';
  }
  async function gerarTreino() {
    const s=students.find(x=>x.id===selectedId); if (!s) return;
    const btn=document.getElementById('btn-gerar'); btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Gerando...';
    addLog('info','🤖 Gerando treino para '+s.nome+'...');
    document.getElementById('workout-result').style.display='none';
    try {
      const d=await (await fetch(BASE+'/api/gerar-treino',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nomeAluno:s.nome,idade:s.idade,peso:s.peso,altura:s.altura,objetivo:s.objetivo,nivel:s.nivel,diasTreino:s.diasTreino,restricoes:s.restricoes})})).json();
      if (d.sucesso) {
        currentTreino=d.treino;
        document.getElementById('workout-content').textContent=typeof d.treino==='object'?JSON.stringify(d.treino,null,2):d.treino;
        document.getElementById('workout-result').style.display='block';
        document.getElementById('btn-enviar').disabled=false;
        addLog('ok','✅ Treino gerado para '+s.nome+'!');
      } else { addLog('erro','❌ '+( d.erro||'Erro desconhecido')); }
    } catch(e) { addLog('erro','❌ Falha: '+e.message); }
    finally { btn.disabled=false; btn.innerHTML='🤖 Gerar Treino com IA'; }
  }
  async function enviarMfit() {
    if (!currentTreino) return;
    const s=students.find(x=>x.id===selectedId); if (!s) return;
    const btn=document.getElementById('btn-enviar'); btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Enviando...';
    addLog('info','💪 Enviando para MFIT: '+s.nome+'...');
    try {
      const d=await (await fetch(BASE+'/api/enviar-mfit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nomeAluno:s.nome,treino:currentTreino})})).json();
      if (d.sucesso) addLog('ok','✅ Automação MFIT iniciada! Acompanhe os logs.');
      else addLog('erro','❌ '+(d.erro||'Erro ao enviar'));
    } catch(e) { addLog('erro','❌ Falha: '+e.message); }
    finally { btn.disabled=false; btn.innerHTML='💪 Enviar para MFIT'; }
  }
  function openModal(editId) {
    editingId=editId||null;
    const s=editId?students.find(x=>x.id===editId):null;
    document.getElementById('modal-title').textContent=s?'Editar Aluno':'Novo Aluno';
    document.getElementById('f-nome').value=s?.nome||'';
    document.getElementById('f-idade').value=s?.idade||'';
    document.getElementById('f-peso').value=s?.peso||'';
    document.getElementById('f-altura').value=s?.altura||'';
    document.getElementById('f-dias').value=s?.diasTreino||'4';
    document.getElementById('f-objetivo').value=s?.objetivo||'Hipertrofia';
    document.getElementById('f-nivel').value=s?.nivel||'iniciante';
    document.getElementById('f-restricoes').value=s?.restricoes||'';
    document.getElementById('modal-overlay').classList.remove('hidden');
    document.getElementById('f-nome').focus();
  }
  function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
  function editCurrentStudent() { if (selectedId) openModal(selectedId); }
  function deleteCurrentStudent() {
    if (!selectedId) return;
    const s=students.find(x=>x.id===selectedId);
    if (!confirm('Remover '+s?.nome+'?')) return;
    students=students.filter(x=>x.id!==selectedId); saveStudents(); selectedId=null; renderStudents();
    document.getElementById('welcome-msg').style.display='block';
    document.getElementById('student-view').style.display='none';
  }
  function saveStudent() {
    const nome=document.getElementById('f-nome').value.trim(); if (!nome) { alert('Nome é obrigatório'); return; }
    const data={id:editingId||Date.now().toString(36)+Math.random().toString(36).slice(2),nome,idade:parseInt(document.getElementById('f-idade').value)||null,peso:parseFloat(document.getElementById('f-peso').value)||null,altura:parseInt(document.getElementById('f-altura').value)||null,objetivo:document.getElementById('f-objetivo').value,nivel:document.getElementById('f-nivel').value,diasTreino:parseInt(document.getElementById('f-dias').value),restricoes:document.getElementById('f-restricoes').value.trim()};
    if (editingId) { const i=students.findIndex(x=>x.id===editingId); if (i>=0) students[i]=data; } else { students.push(data); }
    saveStudents(); renderStudents(); closeModal(); selectStudent(data.id);
  }
  document.getElementById('modal-overlay').addEventListener('click',(e)=>{ if(e.target===e.currentTarget) closeModal(); });
  document.getElementById('btn-new-student').addEventListener('click',()=>openModal());
  renderStudents(); checkStatus(); connectWS(); setInterval(checkStatus,30000);
</script>
</body>
</html>
